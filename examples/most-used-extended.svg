<svg width="520" height="274" viewBox="0 0 520 274" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Most Used Languages</title>
  <desc id="desc">Language usage by GitHub language byte counts across repositories available to the token.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .card-bg { fill: #f6f8fa; stroke: #d0d7de; }
    .title { fill: #24292f; font-size: 18px; font-weight: 600; }
    .meta { fill: #57606a; font-size: 12px; font-weight: 600; }
    .name { fill: #24292f; font-size: 13px; font-weight: 600; }
    .value { fill: #57606a; font-size: 12px; }
    @media (prefers-color-scheme: dark) {
      .card-bg { fill: #161b22; stroke: #30363d; }
      .title, .name { fill: #c9d1d9; }
      .meta, .value { fill: #8b949e; }
    }
  </style>
  <rect x="0.5" y="0.5" width="519" height="273" rx="8" class="card-bg" />
  <text x="18" y="30" class="title">Most Used Languages</text>
  <text x="502" y="30" text-anchor="end" class="meta">all-time</text>
  <clipPath id="bar"><rect x="18" y="54" width="484" height="10" rx="5" /></clipPath>
  <g clip-path="url(#bar)">
    <rect x="18" y="54" width="484" height="10" fill="#d0d7de" />
    <rect x="18.00" y="54" width="210.13" height="10" fill="#3178c6" />
    <rect x="228.13" y="54" width="140.08" height="10" fill="#f1e05a" />
    <rect x="368.21" y="54" width="61.29" height="10" fill="#3572A5" />
    <rect x="429.50" y="54" width="37.62" height="10" fill="#00ADD8" />
    <rect x="467.12" y="54" width="23.09" height="10" fill="#dea584" />
    <rect x="490.20" y="54" width="7.70" height="10" fill="#89e051" />
    <rect x="497.90" y="54" width="4.10" height="10" fill="#384d54" />
  </g>
  <g transform="translate(18 92)">
